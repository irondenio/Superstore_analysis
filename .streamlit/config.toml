[global]

# If false, makes your Streamlit script listen to all interfaces (0.0.0.0) instead of just localhost.
# This is useful if you want to run Streamlit on a server and access it from other machines.
# Default: false
listenOnAllInterfaces = true

# List of folders that should not be watched for changes. This impacts both "Run on Save" and @st.cache.
# Relative paths will be taken as relative to the current working directory.
# Example: ['/home/user/folder_to_ignore/']
folderWatchBlacklist = ['']

[logger]

# Level of logging: 'error', 'warning', 'info', 'debug'.
# Default: 'info'
level = 'info'

[client]

# Whether to enable st.cache.
# Default: true
caching = true

# If false, will attempt to open a new tab or window every time Streamlit is called.
# Default: true
showSidebarNavigation = true

# Controls whether uncaught app exceptions are displayed in the browser. By
# default, this is set to True and Streamlit displays app exceptions and
# associated tracebacks in the browser.
# Default: true
showErrorDetails = true

[server]

# List of folders that should not be watched for changes. This impacts both "Run on Save" and @st.cache.
# Relative paths will be taken as relative to the current working directory.
# Example: ['/home/user/folder_to_ignore/']
folderWatchBlacklist = ['']

# Change the type of file watcher used by Streamlit, or turn it off completely.
# Allowed values: "auto", "watchdog", "polling", "none"
# Default: "auto"
fileWatcherType = "auto"

# Symmetric key used to produce signed cookies. If deploying on multiple replicas,
# this should be set to the same value across all replicas to ensure they all
# share the same secret.
# Default: randomly generated secret key.
cookieSecret = "a-random-key-appears-here"

# If false, will attempt to open a new browser tab every time Streamlit is called.
# Default: true
headless = true

# Automatically rerun script when the file is modified on disk.
# Default: true
runOnSave = false

# The address where the server will listen for client and browser connections.
# Default: "localhost"
address = "0.0.0.0"

# The port where the server will listen for client and browser connections.
# Default: 8501
port = 8501

# The base path for the URL where Streamlit should be reachable from.
# Default: ""
baseUrlPath = ""

# Enables support for Cross-Origin Request Sharing (CORS) protection, for added security.
# Default: true
enableCORS = false

# Enables support for Cross-Site Request Forgery (XSRF) protection, for added security.
# Default: true
enableXsrfProtection = true

# Max size, in megabytes, for files uploaded with the file_uploader.
# Default: 200
maxUploadSize = 200

# Max size, in megabytes, of messages that can be sent via the WebSocket connection.
# Default: 200
maxMessageSize = 200

# Enables support for websocket compression.
# Default: true
enableWebsocketCompression = true

[browser]

# Internet address where users should point their browsers in order to connect to
# the app. Can be IP address or DNS name and path.
# This is used to:
# - Set the correct URL for CORS and XSRF protection.
# - Show the URL in the terminal when the app is started.
# Default: "localhost"
serverAddress = "0.0.0.0"

# Whether to send usage statistics to Streamlit.
# Default: true
gatherUsageStats = false

# Port where users should point their browsers in order to connect to the app.
# This is used to:
# - Set the correct URL for CORS and XSRF protection.
# - Show the URL in the terminal when the app is started.
# Default: 8501
serverPort = 8501